<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexScope · 制度合规审查</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-mark"><i class="ti ti-scan-eye" aria-hidden="true"></i></span>
      <span class="brand-text">
        <span class="brand-title">LexScope</span>
        <span class="brand-sub">审视每一条法规</span>
      </span>
    </div>
    <button id="btn-settings" class="btn btn-ghost" aria-label="设置">
      <i class="ti ti-settings" aria-hidden="true"></i> 设置
    </button>
  </header>

  <!-- 设置面板 -->
  <section id="settings" class="settings panel" hidden>
    <div class="panel-head">
      <h2>密钥设置</h2>
      <span class="hint"><i class="ti ti-lock" aria-hidden="true"></i> 仅存于本浏览器(localStorage),平台不上传、不留存。</span>
    </div>
    <div class="settings-grid">
      <label>AI 模型接口地址
        <input id="set-endpoint" type="text" placeholder="https://api.deepseek.com/v1/chat/completions" />
      </label>
      <label>模型名称
        <input id="set-model" type="text" placeholder="deepseek-chat" />
      </label>
      <label>AI 模型 API Key
        <input id="set-model-key" type="password" placeholder="sk-..." autocomplete="off" />
      </label>
      <label>联网搜索服务
        <select id="set-search-provider">
          <option value="tavily">Tavily</option>
          <option value="serper">Serper (google)</option>
          <option value="bing">Bing Web Search</option>
        </select>
      </label>
      <label>联网搜索 API Key
        <input id="set-search-key" type="password" placeholder="tvly-..." autocomplete="off" />
      </label>
      <label>转发前缀(可选,绕过 CORS 时用)
        <input id="set-proxy" type="text" placeholder="留空则浏览器直连" />
      </label>
    </div>
    <div class="settings-actions">
      <button id="btn-save-settings" class="btn btn-primary"><i class="ti ti-device-floppy" aria-hidden="true"></i> 保存</button>
      <span id="settings-saved" class="saved-tip" hidden>已保存</span>
    </div>
  </section>

  <!-- 步骤条 -->
  <nav class="stepper" aria-label="流程步骤">
    <div class="si on" data-s="1"><span class="dot">1</span><span class="lbl">上传制度</span></div>
    <span class="bar"></span>
    <div class="si" data-s="2"><span class="dot">2</span><span class="lbl">网络选规</span></div>
    <span class="bar"></span>
    <div class="si" data-s="3"><span class="dot">3</span><span class="lbl">审查报告</span></div>
  </nav>

  <main>
    <!-- 步骤1:上传 -->
    <section id="step-1" class="step" data-step="1">
      <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="上传制度文件">
        <i class="ti ti-cloud-upload dz-icon" aria-hidden="true"></i>
        <p class="dz-main">点击或拖拽上传制度文件</p>
        <p class="dz-sub">支持 图片 / Word(.docx) / PDF</p>
        <input id="file-input" type="file" accept=".docx,.pdf,.png,.jpg,.jpeg,.webp,image/*" hidden />
      </div>
      <div id="file-status" class="file-status" hidden></div>
      <p class="note"><i class="ti ti-info-circle" aria-hidden="true"></i> 本平台不自建法规库。下一步由您的 AI 联网检索权威来源,所有引用法条均附原文链接供核对。密钥在右上角「设置」中配置。</p>
      <details class="paste-fallback">
        <summary>或直接粘贴制度文本</summary>
        <textarea id="paste-text" placeholder="将制度全文粘贴到此处……"></textarea>
        <button id="btn-use-paste" class="btn">使用此文本</button>
      </details>
    </section>

    <!-- 步骤2:网络选规 -->
    <section id="step-2" class="step" data-step="2" hidden>
      <div class="search-row">
        <input id="search-query" type="text" placeholder="检索关键词,如:董事 辞职 表决 公司治理" />
        <button id="btn-search" class="btn btn-primary"><i class="ti ti-world-search" aria-hidden="true"></i> 联网检索</button>
      </div>
      <div id="search-status" class="search-status"></div>
      <div id="reg-list" class="reg-list"></div>

      <button id="btn-manual-toggle" class="btn btn-block"><i class="ti ti-plus" aria-hidden="true"></i> 手动添加外规(库内/搜索未覆盖时粘贴条文)</button>
      <div id="manual-form" class="manual-form" hidden>
        <div class="manual-row">
          <input id="manual-name" type="text" placeholder="法规名称,如《公司法》" />
          <input id="manual-clause" type="text" placeholder="条款号,如 第七十条" />
        </div>
        <input id="manual-url" type="text" placeholder="来源链接(可选)" />
        <textarea id="manual-quote" placeholder="粘贴条文原文(必填,用于审查比对)"></textarea>
        <button id="btn-manual-add" class="btn">添加到清单</button>
      </div>

      <div class="step2-foot">
        <label class="mode-toggle">审查模式
          <select id="mode-select">
            <option value="fast">快速(只挑风险点)</option>
            <option value="full">全文体检(逐条对照·更费 token)</option>
          </select>
        </label>
        <span class="sel-count">已选 <b id="sel-count">0</b> 条外规</span>
      </div>
    </section>

    <!-- 步骤3:审查报告(report.js 渲染) -->
    <section id="step-3" class="step" data-step="3" hidden>
      <div id="report-root"></div>
    </section>
  </main>

  <nav class="nav">
    <button id="btn-prev" class="btn"><i class="ti ti-arrow-left" aria-hidden="true"></i> 上一步</button>
    <button id="btn-next" class="btn btn-primary">去联网选规 <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </nav>

  <!-- 全局提示 -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
